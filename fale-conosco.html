  <h2 id="fale-conosco">Fale Conosco</h2>

  <div class="contato">

    <form onsubmit="enviarMensagem(event)">
      <input type="text" id="nome" placeholder="Seu nome" required>
      <input type="email" id="email" placeholder="Seu email" required>
      <textarea id="mensagem" placeholder="Sua mensagem" required></textarea>
      <button type="submit">Enviar</button>
      <p id="resposta"></p>
    </form>

    <div class="info-contato">

      <div class="card-info">
        <h3>Endereço</h3>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT7bgqwiuQkg3ESE1fhDuc80HfmrrNIKF-slA&s" width="60px" class="falecns">
        <p>Rua dos bichinhos, 123 </p>
      </div>

      <div class="card-info">
        <h3>Telefone</h3>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRl4qV8byPpkmX-M-jB8BUPb7AkC0Cqr_UFng&s" width="60px" class="falecns">
        <p>(21) 99999-9999</p>
      </div>

      <div class="card-info">
        <h3>WhatsApp</h3>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQmductGj2j9fClpopyWNyeb0VWKwrBRNcKjA&s" width="60px">
        <a href="https://wa.me/5521969449329" target="_blank" class="falecnsw">

        </a>
      </div>

      <div class="card-info">

        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSYT3exZabjNNYv5MxMC3keJeyNFeXrLpERLQ&s" width="60px" class="falecns">
        <p>contato@petshop.com</p>
      </div>

    </div>
  </div>

</div>

<!--Script do fale conosco-->
<script>
function enviarMensagem(event) {
  event.preventDefault();
  let nome = document.getElementById("nome").value;
  document.getElementById("resposta").innerText =
    "Obrigado, " + nome + "! Entraremos em contato em breve.";
  document.querySelector("form").reset();
}
</script>
